name: Daily Fishing Prediction

on:
  schedule:
    - cron: "0 1 * * *" # Every day at 6:00 PM UTC
  workflow_dispatch: # Manual run button (for testing)

jobs:
  run-prediction:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4.2.2

      - name: Setup Python 3.11
        uses: actions/setup-python@v5.6.0
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Setup Copernicus credentials
        run: |
          mkdir -p ~/.copernicusmarine
          printf '[credentials]\nusername=%s\npassword=%s\n' \
            "${{ secrets.COPERNICUS_USERNAME }}" \
            "${{ secrets.COPERNICUS_PASSWORD }}" \
            > ~/.copernicusmarine/copernicusmarine.cfg

      - name: Run daily pipeline
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
          COPERNICUSMARINE_SERVICE_USERNAME: ${{ secrets.COPERNICUS_USERNAME }}
          COPERNICUSMARINE_SERVICE_PASSWORD: ${{ secrets.COPERNICUS_PASSWORD }}
        run: python daily_pipeline.py
